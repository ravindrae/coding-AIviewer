name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AI Code Review
        uses: ./.github/actions/ai-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
